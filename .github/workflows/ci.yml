name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cml
          POSTGRES_PASSWORD: cml_test_password
          POSTGRES_DB: test_cml_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: backend
        run: uv sync --extra dev

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://cml:cml_test_password@localhost:5432/test_cml_db
          SECRET_KEY: test-secret-key-for-ci
          JWT_ALGORITHM: HS256
          JWT_EXPIRY_HOURS: 24
          ENVIRONMENT: test
          APP_URL: http://localhost:3000
          API_URL: http://localhost:8000
          CORS_ORIGINS: http://localhost:3000
        run: uv run pytest -v
